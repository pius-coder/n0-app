<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Background glow -->
  <circle cx="400" cy="300" r="150" fill="#2563EB" opacity="0.1" filter="blur(60px)"/>
  
  <!-- Phone App / Dashboard Body -->
  <rect x="250" y="100" width="300" height="400" rx="36" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Phone Top Details -->
  <rect x="360" y="120" width="80" height="6" rx="3" fill="#e5e7eb"/>
  
  <!-- Header / App Bar -->
  <path d="M 250 160 L 550 160" stroke="#f3f4f6" stroke-width="2"/>
  
  <!-- Shield Icon -->
  <circle cx="400" cy="220" r="40" fill="#eff6ff"/>
  <path d="M400 195 L420 205 L420 225 C420 240 410 252 400 255 C390 252 380 240 380 225 L380 205 Z" fill="#2563EB"/>
  <path d="M393 225 L398 230 L407 218" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Content / Message Area -->
  <rect x="290" y="290" width="220" height="50" rx="16" fill="#f8fafc"/>
  <text x="320" y="322" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="900" fill="#1e40af" letter-spacing="4">849-210</text>
  
  <!-- Little message bubbles floating out -->
  <rect x="480" y="270" width="40" height="24" rx="12" fill="#3b82f6" opacity="0.9"/>
  <text x="492" y="286" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ffffff">SMS</text>
  
  <rect x="240" y="380" width="140" height="40" rx="20" fill="#22c55e" opacity="0.1"/>
  <text x="260" y="405" font-family="sans-serif" font-size="12" font-weight="bold" fill="#16a34a">✔️ Numéro Active</text>
  
  <!-- Decorative elements -->
  <circle cx="210" cy="180" r="10" fill="#ef4444" opacity="0.2"/>
  <circle cx="580" cy="350" r="16" fill="#f59e0b" opacity="0.2"/>
  
  <!-- Button -->
  <rect x="290" y="440" width="220" height="40" rx="20" fill="#2563EB"/>
  <text x="365" y="465" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Copier le code</text>
</svg>
